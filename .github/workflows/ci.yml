name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports
        run: |
          python -c "import gradio, groq, edge_tts, requests, bs4, googlesearch, duckduckgo_search, wikipedia"

      - name: Install test dependencies
        run: |
          pip install -r tests/requirements-test.txt

      - name: Full test suite with coverage
        run: |
          python -m pytest tests/ --tb=short -q --cov=lumina --cov-report=term --cov-fail-under=65
        env:
          GROQ_API_KEY: test-dummy-key
          GOOGLE_API_KEY: test-dummy-key
          TOGETHER_API_KEY: test-dummy-key

      - name: Fuzz tests (random/malformed inputs)
        run: |
          python -m pytest tests/fuzz/ -m fuzz --tb=short -q
        env:
          GROQ_API_KEY: test-dummy-key
          GOOGLE_API_KEY: test-dummy-key
          TOGETHER_API_KEY: test-dummy-key

